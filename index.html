<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Semanal Corporativa</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        
        .container { width: 100%; max-width: 1100px; }
        
        /* Card Base */
        .card { background: #1e293b; padding: 25px; border-radius: 12px; border: 1px solid #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.3); margin-bottom: 20px; }
        
        /* Login */
        #login-screen { max-width: 400px; margin: 0 auto; }
        h2 { color: #38bdf8; margin-bottom: 20px; text-align: center; font-size: 22px; }
        h3 { color: #f1f5f9; margin-bottom: 15px; font-size: 18px; border-bottom: 2px solid #334155; padding-bottom: 8px; }
        
        /* Formulários e Inputs */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: bold; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px; }
        input[type="text"], input[type="password"], input[type="date"], input[type="time"], select, textarea { width: 100%; padding: 10px; background: #0f172a; border: 1px solid #475569; border-radius: 8px; color: #fff; font-size: 14px; outline: none; }
        input:focus, select:focus, textarea:focus { border-color: #38bdf8; }
        
        /* Checkboxes Dias da Semana */
        .checkbox-days { display: flex; flex-wrap: wrap; gap: 10px; background: #0f172a; padding: 12px; border-radius: 8px; border: 1px solid #475569; }
        .checkbox-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #f8fafc; cursor: pointer; }
        .checkbox-item input[type="checkbox"] { width: 16px; height: 16px; accent-color: #38bdf8; cursor: pointer; }

        /* Botões */
        button { border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .btn-primary { background: #0284c7; color: white; width: 100%; }
        .btn-primary:hover { background: #0369a1; }
        .btn-success { background: #10b981; color: white; }
        .btn-success:hover { background: #059669; }
        .btn-danger { background: #ef4444; color: white; padding: 4px 8px; font-size: 11px; }
        .btn-danger:hover { background: #dc2626; }
        .btn-copy { background: #0284c7; color: white; padding: 4px 8px; font-size: 11px; margin-right: 4px; }
        .btn-copy:hover { background: #0369a1; }
        .btn-logout { background: #334155; color: #f8fafc; }
        .btn-logout:hover { background: #475569; }
        
        /* Topo */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .user-badge { background: #0284c7; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        
        /* Seletor de Data/Semana */
        .week-picker-bar { display: flex; align-items: center; justify-content: space-between; gap: 15px; flex-wrap: wrap; margin-bottom: 15px; background: #0f172a; padding: 15px; border-radius: 8px; border: 1px solid #334155; }
        .week-picker-bar input[type="date"] { width: auto; }
        
        /* Grid da Agenda Semanal */
        .agenda-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-top: 15px; }
        .day-column { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 10px; min-height: 250px; }
        .day-title { color: #38bdf8; font-weight: bold; text-align: center; margin-bottom: 4px; font-size: 14px; }
        .day-date { color: #64748b; font-size: 11px; text-align: center; margin-bottom: 10px; border-bottom: 1px dashed #334155; padding-bottom: 6px; }
        
        /* Card de Evento/Tarefa */
        .event-card { background: #1e293b; border-left: 4px solid #38bdf8; border-radius: 6px; padding: 10px; margin-bottom: 10px; font-size: 13px; position: relative; }
        .event-card.admin-view { border-left-color: #f59e0b; }
        .event-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .event-time { font-weight: bold; color: #e2e8f0; }
        .event-location { color: #38bdf8; font-weight: bold; margin-bottom: 4px; display: block; word-break: break-word; }
        .event-desc { color: #94a3b8; font-size: 12px; word-break: break-word; }
        .event-user { font-size: 10px; background: #334155; color: #f8fafc; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-top: 6px; }
        
        /* Layout Admin */
        .admin-form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">

    <!-- TELA DE LOGIN -->
    <div id="login-screen" class="card">
        <h2>🔒 Agenda - Acesso</h2>
        <form onsubmit="realizarLogin(event)">
            <div class="form-group">
                <label>Usuário</label>
                <input type="text" id="loginUser" required placeholder="Digite seu usuário">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="loginPass" required placeholder="Digite sua senha">
            </div>
            <button type="submit" class="btn-primary">Entrar no Sistema</button>
        </form>
    </div>

    <!-- TELA PRINCIPAL (PAINEL DE CONTROLE) -->
    <div id="main-screen" class="hidden">
        
        <!-- CABEÇALHO -->
        <div class="header card" style="margin-bottom: 15px; padding: 15px 25px;">
            <div>
                <span style="font-size: 18px; font-weight: bold;">👋 Olá, <span id="displayUserName" style="color: #38bdf8;"></span></span>
                <span id="adminBadge" class="user-badge hidden" style="margin-left: 10px; background: #f59e0b;">ADMIN</span>
            </div>
            <button onclick="logout()" class="btn-logout">Sair</button>
        </div>

        <!-- PAINEL EXCLUSIVO DO ADMINISTRADOR -->
        <div id="admin-panel" class="hidden">
            
            <!-- Cadastrar Novo Usuário -->
            <div class="card">
                <h3>👤 Cadastrar Novo Usuário</h3>
                <form onsubmit="cadastrarUsuario(event)" class="admin-form-row">
                    <div class="form-group">
                        <label>Nome / Usuário</label>
                        <input type="text" id="newUsername" placeholder="Ex: joao" required>
                    </div>
                    <div class="form-group">
                        <label>Senha</label>
                        <input type="password" id="newPassword" placeholder="Senha" required>
                    </div>
                    <div class="form-group" style="display: flex; align-items: flex-end;">
                        <button type="submit" class="btn-success" style="width: 100%;">+ Criar Usuário</button>
                    </div>
                </form>
            </div>

            <!-- Atribuir Destino / Tarefa com Múltiplos Usuários e Dias -->
            <div class="card">
                <h3>📌 Agendar Função/Destino</h3>
                <form onsubmit="agendarTarefa(event)">
                    <div class="admin-form-row">
                        <div class="form-group">
                            <label>Usuário 1 *</label>
                            <select id="scheduleUserSelect1" class="user-select-box" required>
                                <option value="">Carregando...</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Usuário 2 (Opcional)</label>
                            <select id="scheduleUserSelect2" class="user-select-box">
                                <option value="">Nenhum</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Horário</label>
                            <input type="time" id="scheduleTime" required>
                        </div>
                        <div class="form-group">
                            <label>Local / Destino (Função)</label>
                            <input type="text" id="scheduleLocation" placeholder="Ex: Cliente XYZ / Suporte" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Selecione os Dias da Semana para esta Função *</label>
                        <div class="checkbox-days" id="checkboxDaysContainer">
                            <!-- Os checkboxes serão injetados via JS com as datas da semana visível -->
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Instruções / Descrição</label>
                        <textarea id="scheduleDesc" rows="2" placeholder="Ex: Realizar verificação e manutenção nos equipamentos."></textarea>
                    </div>
                    <button type="submit" class="btn-success">Lançar na Agenda</button>
                </form>
            </div>
        </div>

        <!-- AGENDA SEMANAL (VISÍVEL PARA TODOS) -->
        <div class="card">
            <div class="week-picker-bar">
                <div>
                    <label>Selecione um dia do Mês/Semana:</label>
                    <input type="date" id="weekPickerDate" onchange="atualizarSemanaPorData(this.value)">
                </div>
                <div style="font-size: 13px; color: #38bdf8; font-weight: bold;" id="weekRangeLabel">
                    Exibindo semana...
                </div>
            </div>

            <h3>📅 Agenda Semanal</h3>
            <div class="agenda-grid" id="agendaGridContainer">
                <!-- As colunas dos dias da semana serão geradas dinamicamente aqui -->
            </div>
        </div>

    </div>

</div>

<script>
    const DIAS_NOMES = ["Segunda-feira", "Terça-feira", "Quarta-feira", "Quinta-feira", "Sexta-feira", "Sábado", "Domingo"];
    
    let usuarios = JSON.parse(localStorage.getItem('app_usuarios')) || [
        { user: 'admin', pass: 'Rafa180993', role: 'admin' }
    ];

    let agendamentos = JSON.parse(localStorage.getItem('app_agendamentos')) || [];
    let usuarioLogado = null;
    let datasDaSemanaAtual = [];

    // --- AUTENTICAÇÃO E LOGIN ---
    function realizarLogin(e) {
        e.preventDefault();
        const u = document.getElementById('loginUser').value.trim();
        const p = document.getElementById('loginPass').value.trim();

        const usuarioEncontrado = usuarios.find(user => user.user.toLowerCase() === u.toLowerCase() && user.pass === p);

        if (usuarioEncontrado) {
            usuarioLogado = usuarioEncontrado;
            document.getElementById('loginUser').value = '';
            document.getElementById('loginPass').value = '';
            carregarAplicacao();
        } else {
            alert('❌ Usuário ou senha incorretos!');
        }
    }

    function logout() {
        usuarioLogado = null;
        document.getElementById('main-screen').classList.add('hidden');
        document.getElementById('login-screen').classList.remove('hidden');
    }

    // --- INICIALIZAÇÃO DA INTERFACE ---
    function carregarAplicacao() {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');
        document.getElementById('displayUserName').innerText = usuarioLogado.user;

        const isAdmin = usuarioLogado.role === 'admin';

        if (isAdmin) {
            document.getElementById('admin-panel').classList.remove('hidden');
            document.getElementById('adminBadge').classList.remove('hidden');
            atualizarSelectUsuarios();
        } else {
            document.getElementById('admin-panel').classList.add('hidden');
            document.getElementById('adminBadge').classList.add('hidden');
        }

        const hojeISO = new Date().toISOString().split('T')[0];
        document.getElementById('weekPickerDate').value = hojeISO;
        
        atualizarSemanaPorData(hojeISO);
    }

    // --- CÁLCULO DE DATAS DA SEMANA ---
    function atualizarSemanaPorData(dataString) {
        if (!dataString) return;

        const partes = dataString.split('-');
        const data = new Date(Date.UTC(partes[0], partes[1] - 1, partes[2]));

        let diaDaSemana = data.getUTCDay();
        let diferencaParaSegunda = diaDaSemana === 0 ? -6 : 1 - diaDaSemana;

        const segundaFeira = new Date(data);
        segundaFeira.setUTCDate(data.getUTCDate() + diferencaParaSegunda);

        datasDaSemanaAtual = [];
        for (let i = 0; i < 7; i++) {
            const diaTemp = new Date(segundaFeira);
            diaTemp.setUTCDate(segundaFeira.getUTCDate() + i);
            const iso = diaTemp.toISOString().split('T')[0];
            const dataFmt = diaTemp.getUTCDate().toString().padStart(2, '0') + '/' + (diaTemp.getUTCMonth() + 1).toString().padStart(2, '0');
            
            datasDaSemanaAtual.push({
                nomeDia: DIAS_NOMES[i],
                dataISO: iso,
                dataFormatada: dataFmt
            });
        }

        const inicioSemana = datasDaSemanaAtual[0].dataFormatada;
        const fimSemana = datasDaSemanaAtual[6].dataFormatada;
        document.getElementById('weekRangeLabel').innerText = `Semana de ${inicioSemana} até ${fimSemana}`;

        renderizarCheckboxesDias();
        renderizarAgenda();
    }

    function renderizarCheckboxesDias() {
        const container = document.getElementById('checkboxDaysContainer');
        if (!container) return;
        container.innerHTML = '';

        datasDaSemanaAtual.forEach(diaInfo => {
            const label = document.createElement('label');
            label.className = 'checkbox-item';
            label.innerHTML = `
                <input type="checkbox" name="selectedDay" value="${diaInfo.dataISO}">
                ${diaInfo.nomeDia.split('-')[0]} (${diaInfo.dataFormatada})
            `;
            container.appendChild(label);
        });
    }

    // --- FUNÇÕES DO ADMINISTRADOR ---
    function cadastrarUsuario(e) {
        e.preventDefault();
        const u = document.getElementById('newUsername').value.trim();
        const p = document.getElementById('newPassword').value.trim();

        if (usuarios.some(user => user.user.toLowerCase() === u.toLowerCase())) {
            alert('⚠️ Este nome de usuário já existe!');
            return;
        }

        usuarios.push({ user: u, pass: p, role: 'user' });
        salvarDados();
        alert(`✅ Usuário "${u}" criado com sucesso!`);
        
        document.getElementById('newUsername').value = '';
        document.getElementById('newPassword').value = '';
        atualizarSelectUsuarios();
    }

    function atualizarSelectUsuarios() {
        const selects = document.querySelectorAll('.user-select-box');
        
        selects.forEach((select, index) => {
            select.innerHTML = index === 0 
                ? '<option value="">Selecione o Usuário 1...</option>' 
                : '<option value="">Nenhum (Apenas 1 usuário)</option>';
            
            usuarios.forEach(user => {
                const option = document.createElement('option');
                option.value = user.user;
                option.innerText = user.user + (user.role === 'admin' ? ' (Admin)' : '');
                select.appendChild(option);
            });
        });
    }

    function agendarTarefa(e) {
        e.preventDefault();
        const u1 = document.getElementById('scheduleUserSelect1').value;
        const u2 = document.getElementById('scheduleUserSelect2').value;
        const hora = document.getElementById('scheduleTime').value;
        const local = document.getElementById('scheduleLocation').value.trim();
        const desc = document.getElementById('scheduleDesc').value.trim();

        // Pega todos os checkboxes marcados
        const checkboxesMarcados = document.querySelectorAll('input[name="selectedDay"]:checked');
        const diasSelecionados = Array.from(checkboxesMarcados).map(cb => cb.value);

        if (!u1) {
            alert('Por favor, selecione pelo menos o Usuário 1.');
            return;
        }

        if (diasSelecionados.length === 0) {
            alert('Por favor, marque pelo menos um dia da semana!');
            return;
        }

        // Monta a lista de usuários selecionados
        const listaUsuarios = [u1];
        if (u2 && u2 !== u1) {
            listaUsuarios.push(u2);
        }

        let totalLancamentos = 0;

        // Itera sobre todos os dias e usuários para gravar individualmente
        diasSelecionados.forEach(dataIso => {
            listaUsuarios.forEach(user => {
                const novoEvento = {
                    id: Date.now() + Math.random(),
                    usuario: user,
                    data: dataIso,
                    hora: hora,
                    local: local,
                    desc: desc
                };
                agendamentos.push(novoEvento);
                totalLancamentos++;
            });
        });

        salvarDados();
        alert(`📌 ${totalLancamentos} agendamento(s) salvo(s) com sucesso!`);

        document.getElementById('scheduleLocation').value = '';
        document.getElementById('scheduleDesc').value = '';
        document.querySelectorAll('input[name="selectedDay"]').forEach(cb => cb.checked = false);

        renderizarAgenda();
    }

    function duplicarEvento(id) {
        const eventoOriginal = agendamentos.find(ev => ev.id === id);
        if (!eventoOriginal) return;

        const novaData = prompt('📋 COPIAR EVENTO\nDigite ou selecione a nova data no formato AAAA-MM-DD:', eventoOriginal.data);

        if (novaData && novaData.trim() !== '') {
            const eventoDuplicado = {
                ...eventoOriginal,
                id: Date.now() + Math.random(),
                data: novaData.trim()
            };

            agendamentos.push(eventoDuplicado);
            salvarDados();
            alert('✅ Evento copiado com sucesso!');
            
            atualizarSemanaPorData(novaData.trim());
            document.getElementById('weekPickerDate').value = novaData.trim();
        }
    }

    function deletarEvento(id) {
        if (confirm('Deseja remover este agendamento?')) {
            agendamentos = agendamentos.filter(ev => ev.id !== id);
            salvarDados();
            renderizarAgenda();
        }
    }

    // --- RENDERIZAÇÃO DA AGENDA ---
    function renderizarAgenda() {
        const container = document.getElementById('agendaGridContainer');
        container.innerHTML = '';

        const isAdmin = usuarioLogado.role === 'admin';

        datasDaSemanaAtual.forEach(diaInfo => {
            const col = document.createElement('div');
            col.className = 'day-column';

            let htmlEventos = '';

            const eventosDoDia = agendamentos.filter(ev => {
                const mesmaData = ev.data === diaInfo.dataISO;
                return isAdmin ? mesmaData : (mesmaData && ev.usuario.toLowerCase() === usuarioLogado.user.toLowerCase());
            });

            eventosDoDia.sort((a, b) => a.hora.localeCompare(b.hora));

            eventosDoDia.forEach(ev => {
                const acoesAdmin = isAdmin ? `
                    <div>
                        <button class="btn-copy" onclick="duplicarEvento(${ev.id})" title="Copiar para outro dia">📋</button>
                        <button class="btn-danger" onclick="deletarEvento(${ev.id})" title="Excluir">✕</button>
                    </div>
                ` : '';

                const tagUsuario = isAdmin ? `<span class="event-user">👤 ${ev.usuario}</span>` : '';

                htmlEventos += `
                    <div class="event-card ${isAdmin ? 'admin-view' : ''}">
                        <div class="event-header">
                            <span class="event-time">⏰ ${ev.hora}</span>
                            ${acoesAdmin}
                        </div>
                        <span class="event-location">📍 ${ev.local}</span>
                        <div class="event-desc">${ev.desc || ''}</div>
                        ${tagUsuario}
                    </div>
                `;
            });

            col.innerHTML = `
                <div class="day-title">${diaInfo.nomeDia.split('-')[0]}</div>
                <div class="day-date">${diaInfo.dataFormatada}</div>
                ${htmlEventos || '<p style="color:#475569; font-size:11px; text-align:center; margin-top:20px;">Sem tarefas</p>'}
            `;

            container.appendChild(col);
        });
    }

    // --- PERSISTÊNCIA ---
    function salvarDados() {
        localStorage.setItem('app_usuarios', JSON.stringify(usuarios));
        localStorage.setItem('app_agendamentos', JSON.stringify(agendamentos));
    }
</script>

</body>
</html>
